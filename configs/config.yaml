server:
  port: 8080
  grpc_port: 9090
  env: "local"

db:
  postgres:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: "securepassword"
    dbname: "threat_intel"
    sslmode: "disable"
  elasticsearch:
    addresses:
      - "http://localhost:9200"
  redis:
    host: "localhost"
    port: 6379
    password: ""
    db: 0

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"

enrichment:
  shodan:
    api_key: "SHODAN_API_KEY_PLACEHOLDER"
  virustotal:
    api_key: "VIRUSTOTAL_API_KEY_PLACEHOLDER"

logging:
  level: "info"
