server:
  port: 8080
  grpc_port: 9090
  env: "local"

db:
  postgres:
    host: "postgres"
    port: 5432
    user: "postgres"
    password: "CHANGE_ME"
    dbname: "threat_intel"
    sslmode: "require"
  elasticsearch:
    addresses:
      - "http://elasticsearch:9200"
  redis:
    host: "redis"
    port: 6379
    password: "CHANGE_ME"
    db: 0

rabbitmq:
  url: "amqp://guest:guest@rabbitmq:5672/"

enrichment:
  shodan:
    api_key: "YOUR_SHODAN_API_KEY"
  virustotal:
    api_key: "YOUR_VIRUSTOTAL_API_KEY"

logging:
  level: "info"
